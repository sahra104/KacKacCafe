<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Kac Kac Café</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fcf8f2;
            color: #4a3b32;
        }

        .navbar {
            background-color: #5c4033 !important;
        }

        .navbar-brand,
        .nav-link {
            color: #fdfaf6 !important;
        }

        .gallery-img {
            cursor: pointer;
            transition: transform 0.3s ease;
            height: 250px;
            object-fit: cover;
            width: 100%;
            border-radius: 8px;
        }

        .gallery-img:hover {
            transform: scale(1.03);
        }

        footer {
            background-color: #3e2a20;
            color: #d7ccc8;
            padding: 20px 0;
            text-align: center;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">☕ Kac Kac Café</a>
            <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-medium">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link active" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 py-4">
        <div class="text-center mb-5">
            <h1 class="fw-bold text-dark">Visual Highlights & Showcase</h1>
            <p class="text-muted lead">Filter through live snapshots of our kitchens and prepared orders.</p>

            <div class="mt-4">
                <button class="btn btn-outline-dark mx-1 active" onclick="filterGallery('all')">Show All</button>
                <button class="btn btn-outline-dark mx-1" onclick="filterGallery('pastry')">Pastries</button>
                <button class="btn btn-outline-dark mx-1" onclick="filterGallery('beverage')">Beverages</button>
            </div>
        </div>

        <div class="row g-4" id="galleryContainer">
            <div class="col-md-4 gallery-item pastry">
                <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=400"
                    class="gallery-img shadow-sm" alt="Crisp morning pastries">
            </div>
            <div class="col-md-4 gallery-item beverage">
                <img src="https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=400"
                    class="gallery-img shadow-sm" alt="Hot brewed house tea">
            </div>
            <div class="col-md-4 gallery-item pastry">
                <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=400"
                    class="gallery-img shadow-sm" alt="Fresh prepared local crepes">
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p class="mb-1">&copy; 2026 Kac Kac Café Nairobi. All Rights Reserved.</p>
            <small class="text-muted">Designed by Sahra Abdikadir</small>
        </div>
    </footer>

    <script>
        function filterGallery(category) {
            const items = document.querySelectorAll('.gallery-item');
            items.forEach(item => {
                if (category === 'all' || item.classList.contains(category)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });

            // Update active styling on button selection triggers
            const buttons = document.querySelectorAll('.btn-outline-dark');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
