<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Kac Kac Café</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fcf8f2; color: #4a3b32; }
        .navbar { background-color: #5c4033 !important; }
        .navbar-brand, .nav-link { color: #fdfaf6 !important; }
        /* contact.jpg: white Swahili/coastal architecture with palm trees -->
           used as a full-width banner above the form */
        .contact-banner {
            width: 100%;
            height: 260px;
            object-fit: cover;
            object-position: center 60%;
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        footer { background-color: #3e2a20; color: #d7ccc8; padding: 20px 0; text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">☕ Kac Kac Café</a>
            <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-medium">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 py-4" style="max-width: 640px;">
        <!-- contact.jpg: East African coastal white-washed architecture with palms -->
        <img src="assets/contact.jpg" class="contact-banner" alt="East African coastal architecture near Kac Kac Café">

        <div class="bg-white p-4 rounded shadow-sm">
            <h2 class="fw-bold mb-3 text-dark text-center">Get in Touch</h2>
            <p class="text-muted text-center mb-4">Send us your feedback or book catering services directly below.</p>

            <div id="alertBox"></div>

            <form id="contactForm" onsubmit="return validateContactForm(event)">
                <div class="mb-3">
                    <label for="userName" class="form-label fw-medium">Full Name</label>
                    <input type="text" class="form-control" id="userName" placeholder="Your full name">
                </div>
                <div class="mb-3">
                    <label for="userEmail" class="form-label fw-medium">Email Address</label>
                    <input type="email" class="form-control" id="userEmail" placeholder="name@example.com">
                </div>
                <div class="mb-3">
                    <label for="userMessage" class="form-label fw-medium">Message Details</label>
                    <textarea class="form-control" id="userMessage" rows="4"
                        placeholder="Share booking details or notes..."></textarea>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold shadow-sm">Submit Form</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p class="mb-1">&copy; 2026 Kac Kac Café Nairobi. All Rights Reserved.</p>
            <small class="text-muted">Designed by Sahra Abdikadir</small>
        </div>
    </footer>

    <script>
        function validateContactForm(e) {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const msg = document.getElementById('userMessage').value.trim();
            const alertBox = document.getElementById('alertBox');

            if (!name || !email || !msg) {
                alertBox.innerHTML = `
                  <div class="alert alert-danger" role="alert">
                    <strong>Validation Error:</strong> All input fields must be filled out completely before submitting!
                  </div>`;
                return false;
            }

            alertBox.innerHTML = `
              <div class="alert alert-success" role="alert">
                <strong>Thank you, ${name}!</strong> Your request has been logged successfully. We will follow up via email shortly.
              </div>`;
            document.getElementById('contactForm').reset();
            return true;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
